<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<!-- CSS -->
<link rel="stylesheet" href="signup.css">
</head>

<body>

<div class="signup-box">
  <div class="logo">SPORTS LIVE</div>
  <div class="subtitle">실시간 경기와 AI 분석을 시작하세요</div>

  <div class="input-group">
    <label>이메일</label>
    <input type="email" id="email" placeholder="example@email.com">
  </div>

  <div class="input-group">
    <label>비밀번호</label>
    <input type="password" id="password" placeholder="6자리 이상 입력">
  </div>

  <div class="input-group">
    <label>비밀번호 확인</label>
    <input type="password" id="passwordCheck" placeholder="비밀번호 재입력">
  </div>

  <button class="signup-btn" onclick="signup()">회원가입</button>

  <div id="message" class="message"></div>

  <div class="links">
    이미 계정이 있나요?
    <a href="login.html">로그인</a>
  </div>

  <div class="back">
    <a href="index.html">← 홈으로 돌아가기</a>
  </div>
</div>

<!-- JS -->
<script src="signup.js"></script>

</body>
</html>
